<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SoundZoo - Click any animal or bird card to hear its sound using your browser's Speech Synthesis."
    />
    <meta name="author" content="SoundZoo" />
    <title>SoundZoo - Animal &amp; Bird Sound Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ===== Site Header ===== -->
    <header class="site-header">
      <div class="header-inner">
        <h1 class="site-title">🦁 SoundZoo</h1>
        <p class="site-subtitle">Animal &amp; Bird Sound Explorer</p>
      </div>
    </header>

    <!-- ===== Main Content ===== -->
    <main class="main-content">

      <!-- Image Upload Section -->
      <section class="upload-section" aria-label="Image upload">
        <div class="upload-card">
          <h2 class="upload-heading">📷 Upload Your Animal Image</h2>
          <label for="imageUpload" class="upload-label">
            Choose Image
            <input
              type="file"
              id="imageUpload"
              accept="image/*"
              aria-label="Upload an animal image"
            />
          </label>
          <div class="image-preview-wrapper" id="imagePreviewWrapper">
            <img id="imagePreview" src="" alt="Uploaded animal image preview" />
            <button class="remove-btn" id="removeImageBtn" type="button">
              ✕ Remove Image
            </button>
          </div>
        </div>
      </section>

      <!-- Animals Section -->
      <section class="sound-section" aria-label="Animals">
        <h2 class="section-heading">🐾 Animals</h2>
        <div class="card-grid" id="animalGrid" role="list"></div>
      </section>

      <!-- Birds Section -->
      <section class="sound-section" aria-label="Birds">
        <h2 class="section-heading">🐦 Birds</h2>
        <div class="card-grid" id="birdGrid" role="list"></div>
      </section>

    </main>

    <!-- ===== Site Footer ===== -->
    <footer class="site-footer">
      <p>Made with ❤️ &nbsp;|&nbsp; SoundZoo &copy; 2024 &nbsp;|&nbsp; Click any card to hear the sound!</p>
    </footer>

    <!-- ===== Add Animal / Bird Modal ===== -->
    <div class="modal-overlay" id="addModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-box">
        <button class="modal-close-btn" id="modalCloseBtn" type="button" aria-label="Close modal">✕</button>
        <h3 class="modal-title" id="modalTitle">Add New Animal</h3>

        <form id="addEntryForm" novalidate>

          <!-- Name -->
          <div class="form-group">
            <label class="form-label" for="addName">Name <span class="form-required">*</span></label>
            <input class="form-input" type="text" id="addName" placeholder="e.g. Fox" maxlength="30" autocomplete="off" />
            <span class="form-error" id="nameError"></span>
          </div>

          <!-- Emoji -->
          <div class="form-group">
            <label class="form-label" for="addEmoji">Emoji <span class="form-hint">(optional — used if no image)</span></label>
            <input class="form-input form-input--emoji" type="text" id="addEmoji" placeholder="🦊" maxlength="4" />
          </div>

          <!-- Sound Text -->
          <div class="form-group">
            <label class="form-label" for="addSoundText">Sound Text <span class="form-required">*</span></label>
            <input class="form-input" type="text" id="addSoundText" placeholder="e.g. Ring Ring" maxlength="60" autocomplete="off" />
            <span class="form-error" id="soundTextError"></span>
          </div>

          <!-- Image Upload -->
          <div class="form-group">
            <span class="form-label">Image <span class="form-hint">(optional)</span></span>
            <label class="file-pick-label" for="addImage">
              📷 Choose Image
              <input type="file" id="addImage" accept="image/*" />
            </label>
            <span class="file-chosen" id="imageChosen">No file chosen</span>
            <img class="modal-img-preview" id="modalImgPreview" src="" alt="Preview" />
          </div>

          <!-- MP3 Upload -->
          <div class="form-group">
            <span class="form-label">MP3 / Audio <span class="form-hint">(optional — plays instead of speech)</span></span>
            <label class="file-pick-label" for="addAudio">
              🎵 Choose MP3
              <input type="file" id="addAudio" accept="audio/*" />
            </label>
            <span class="file-chosen" id="audioChosen">No file chosen</span>
          </div>

          <!-- Actions -->
          <div class="form-actions">
            <button type="button" class="modal-cancel-btn" id="modalCancelBtn">Cancel</button>
            <button type="submit" class="modal-submit-btn">Add Card ✓</button>
          </div>

        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
