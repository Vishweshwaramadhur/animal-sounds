<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SoundZoo - Click any animal or bird card to hear its sound using your browser's Speech Synthesis."
    />
    <meta name="author" content="SoundZoo" />
    <title>SoundZoo - Animal &amp; Bird Sound Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ===== Site Header ===== -->
    <header class="site-header">
      <div class="header-inner">
        <h1 class="site-title">🦁 SoundZoo</h1>
        <p class="site-subtitle">Animal &amp; Bird Sound Explorer</p>
      </div>
    </header>

    <!-- ===== Main Content ===== -->
    <main class="main-content">

      <!-- Image Upload Section -->
      <section class="upload-section" aria-label="Image upload">
        <div class="upload-card">
          <h2 class="upload-heading">📷 Upload Your Animal Image</h2>
          <label for="imageUpload" class="upload-label">
            Choose Image
            <input
              type="file"
              id="imageUpload"
              accept="image/*"
              aria-label="Upload an animal image"
            />
          </label>
          <div class="image-preview-wrapper" id="imagePreviewWrapper">
            <img id="imagePreview" src="" alt="Uploaded animal image preview" />
            <button class="remove-btn" id="removeImageBtn" type="button">
              ✕ Remove Image
            </button>
          </div>
        </div>
      </section>

      <!-- Animals Section -->
      <section class="sound-section" aria-label="Animals">
        <h2 class="section-heading">🐾 Animals</h2>
        <div class="card-grid" id="animalGrid" role="list"></div>
      </section>

      <!-- Birds Section -->
      <section class="sound-section" aria-label="Birds">
        <h2 class="section-heading">🐦 Birds</h2>
        <div class="card-grid" id="birdGrid" role="list"></div>
      </section>

    </main>

    <!-- ===== Site Footer ===== -->
    <footer class="site-footer">
      <p>Made with ❤️ &nbsp;|&nbsp; SoundZoo &copy; 2024 &nbsp;|&nbsp; Click any card to hear the sound!</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
